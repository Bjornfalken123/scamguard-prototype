name = "scamguard-ai-call-filter"
main = "src/worker.ts"
compatibility_date = "2026-06-01"

[assets]
directory = "./public"
binding = "ASSETS"

[[kv_namespaces]]
binding = "SCAMGUARD_KV"
id = "REPLACE_WITH_YOUR_KV_NAMESPACE_ID"

[vars]
APP_NAME = "ScamGuard"
FORWARD_TO_NUMBER = "+46700000000"
TRUSTED_NUMBERS = "+46701111111,+46702222222"
RISK_THRESHOLD = "65"
AI_PROVIDER = "rules"
